name: "Bose SoundTouch Bridge"
description: "Maps physical preset buttons on Bose SoundTouch speakers to Music Assistant playback. Press a button — the configured radio station or media plays via Music Assistant. Also fires HA events for additional automations."
version: "3.1.0"
slug: "bose_bridge"
url: "https://github.com/sebastianaberle4324/homeassistant-bose-soundtouch-bridge"
init: false
arch:
  - amd64
  - aarch64
boot: auto
startup: services
host_network: true
hassio_api: true
homeassistant_api: true
options:
  bose_host: ""
  sync_presets_on_startup: true
  media_player_entity: ""
  presets:
    - media_id: ""
      name: "Preset 1"
    - media_id: ""
      name: "Preset 2"
    - media_id: ""
      name: "Preset 3"
    - media_id: ""
      name: "Preset 4"
    - media_id: ""
      name: "Preset 5"
    - media_id: ""
      name: "Preset 6"
schema:
  bose_host: str
  sync_presets_on_startup: bool
  media_player_entity: str
  presets:
    - media_id: str
      name: str
descriptions:
  bose_host: "IP address of the speaker (e.g. 192.168.1.42). Leave blank for auto-discovery."
  sync_presets_on_startup: "Write placeholders into empty preset slots so all 6 buttons fire events."
  media_player_entity: "Music Assistant media player entity (e.g. media_player.soundtouch_20_music_assistant). Leave blank for auto-detection."
  presets: "Configure up to 6 presets. Set media_id for MA playback (e.g. library://radio/6) or leave empty for event-only mode."
