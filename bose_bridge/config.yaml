name: "Bose SoundTouch Bridge"
description: "Fires Home Assistant events when physical preset buttons are pressed on Bose SoundTouch speakers (after the Bose cloud retirement 2026). Use automations to react — e.g. play music via Music Assistant."
version: "2.0.0"
slug: "bose_bridge"
url: "https://github.com/sebastianaberle4324/homeassistant-bose-soundtouch-bridge"
init: false
arch:
  - amd64
  - aarch64
boot: auto
startup: services
host_network: true
options:
  bose_host: ""
  sync_presets_on_startup: true
  placeholder_url: "http://icecast.vrtcdn.be/radio1-high.mp3"
schema:
  bose_host: str
  sync_presets_on_startup: bool
  placeholder_url: str
