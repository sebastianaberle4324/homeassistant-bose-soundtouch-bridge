name: "Bose SoundTouch Bridge"
description: "Maps physical preset buttons on Bose SoundTouch speakers to Music Assistant playback. Press a button — the configured radio station or media plays via Music Assistant. Also fires HA events for additional automations."
version: "3.3.2"
slug: "bose_bridge"
url: "https://github.com/sebastianaberle4324/homeassistant-bose-soundtouch-bridge"
init: false
arch:
  - amd64
  - aarch64
boot: auto
startup: services
host_network: true
hassio_api: true
homeassistant_api: true
options:
  bose_host: ""
  sync_presets_on_startup: true
  auto_play_on_power_on: true
  media_player_entity: ""
  preset_1_media_id: ""
  preset_1_name: "Preset 1"
  preset_2_media_id: ""
  preset_2_name: "Preset 2"
  preset_3_media_id: ""
  preset_3_name: "Preset 3"
  preset_4_media_id: ""
  preset_4_name: "Preset 4"
  preset_5_media_id: ""
  preset_5_name: "Preset 5"
  preset_6_media_id: ""
  preset_6_name: "Preset 6"
schema:
  bose_host: "str?"
  sync_presets_on_startup: bool
  auto_play_on_power_on: bool
  media_player_entity: "str?"
  preset_1_media_id: "str?"
  preset_1_name: "str?"
  preset_2_media_id: "str?"
  preset_2_name: "str?"
  preset_3_media_id: "str?"
  preset_3_name: "str?"
  preset_4_media_id: "str?"
  preset_4_name: "str?"
  preset_5_media_id: "str?"
  preset_5_name: "str?"
  preset_6_media_id: "str?"
  preset_6_name: "str?"
descriptions:
  bose_host: "Speaker IP (e.g. 192.168.1.42). Leave blank to auto-discover via SSDP; the found IP is saved here automatically. Clear to re-discover."
  sync_presets_on_startup: "Write placeholders into empty preset slots so all 6 buttons fire events."
  auto_play_on_power_on: "Automatically resume the last preset when the speaker powers on."
  media_player_entity: "Music Assistant entity (e.g. media_player.soundtouch_20_music_assistant). Leave blank to auto-detect; the found entity is saved here automatically. Clear to re-detect."
  preset_1_media_id: "Music Assistant media ID for preset 1 (e.g. library://radio/6). Leave blank for event-only."
  preset_1_name: "Display name for preset 1 on the speaker."
  preset_2_media_id: "Music Assistant media ID for preset 2 (e.g. library://radio/9)."
  preset_2_name: "Display name for preset 2 on the speaker."
  preset_3_media_id: "Music Assistant media ID for preset 3."
  preset_3_name: "Display name for preset 3 on the speaker."
  preset_4_media_id: "Music Assistant media ID for preset 4."
  preset_4_name: "Display name for preset 4 on the speaker."
  preset_5_media_id: "Music Assistant media ID for preset 5."
  preset_5_name: "Display name for preset 5 on the speaker."
  preset_6_media_id: "Music Assistant media ID for preset 6."
  preset_6_name: "Display name for preset 6 on the speaker."
