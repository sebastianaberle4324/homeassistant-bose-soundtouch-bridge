name: "Bose SoundTouch Bridge"
description: "Brings preset buttons back to life on Bose SoundTouch speakers after the Bose cloud retirement (2026). Maps each preset to a stream URL and pushes via local UPnP."
version: "1.3.0"
slug: "bose_bridge"
url: "https://github.com/sandervg/homeassistant-bose-soundtouch-bridge"
init: false
arch:
  - amd64
  - aarch64
boot: auto
startup: services
host_network: true
services:
  - mqtt:need
options:
  bose_host: ""
  preset_1_url: ""
  preset_2_url: ""
  preset_3_url: ""
  preset_4_url: ""
  preset_5_url: ""
  preset_6_url: ""
schema:
  bose_host: str
  preset_1_url: str
  preset_2_url: str
  preset_3_url: str
  preset_4_url: str
  preset_5_url: str
  preset_6_url: str
